name: Bandit Security Scan
 
on:
  push:
    branches: [ main, branch-1 ]
  pull_request:
    branches: [ main, branch-1 ]
 
jobs:
  bandit:
    runs-on: ubuntu-latest
 
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
 
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
 
    - name: Install Bandit
      run: pip install bandit
 
    - name: Run Bandit
      run: bandit -r . -f txt
